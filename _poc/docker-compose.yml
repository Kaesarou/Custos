version: "3.8"
services:
  ursula1:
    build: ./ursula
    container_name: ursula1
    environment:
      - NODE_NAME=ursula1
      - DATA_DIR=/data
      # Optionally: set RPC_URL and CONTRACT_ADDRESS to enable watcher polling
      # - RPC_URL=http://host.docker.internal:8545
      # - CONTRACT_ADDRESS=0x123...
    volumes:
      - ./ursula/data1:/data
    ports:
      - "8001:8000"

  ursula2:
    build: ./ursula
    container_name: ursula2
    environment:
      - NODE_NAME=ursula2
      - DATA_DIR=/data
    volumes:
      - ./ursula/data2:/data
    ports:
      - "8002:8000"
