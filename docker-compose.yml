services:
  custos-test-chain:
    build:
      context: ./custos-test-chain
      dockerfile: Dockerfile
    container_name: custos-test-chain
    profiles:
      - dev
    ports:
      - "8545:8545"
    volumes:
      - ./custos-test-chain/deployments:/app/deployments

  postgres:
    image: postgres:18-alpine
    container_name: custos-postgres
    environment:
      POSTGRES_DB: custos
      POSTGRES_USER: custos
      POSTGRES_PASSWORD: custos
    ports:
      - "5432:5432"
    volumes:
      - custos-postgres-data:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U custos -d custos" ]
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:latest
    container_name: custos-adminer
    ports:
      - "8081:8080"
    depends_on:
      - postgres

  custos-node:
    build:
      context: .
      dockerfile: Dockerfile
    image: custos-node:0.1.0-SNAPSHOT
    container_name: custos-node
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/custos
      SPRING_DATASOURCE_USERNAME: custos
      SPRING_DATASOURCE_PASSWORD: custos
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  custos-postgres-data: